name: Sync Issues from TXT

on:
  push:
    paths:
      - 'issues.txt'

jobs:
  sync-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write # issues.txtを上書きコミットするために必要
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run sync script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/sync_issues.py

      - name: Commit updated issues.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issues.txt
          # 変更がある場合のみコミット。[skip ci]でアクションの無限ループを防ぐ
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: sync issue numbers [skip ci]"
          git push